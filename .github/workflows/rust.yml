name: Rust + Fuzzer

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      duration_seconds:
        description: 'Duration in seconds (max ~21600)'
        required: true
        default: '21300'
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose

  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Release Fuzzer
        run: cargo build --release --bin fuzz_integrated

      - name: Run Long Fuzzer (5h 55min)
        run: |
          echo "🚀 Starting fuzzer for ${{ inputs.duration_seconds }} seconds (5 hours 55 min)..."
          ./run_5hour_test.sh
        env:
          DURATION_SECONDS: ${{ inputs.duration_seconds }}
